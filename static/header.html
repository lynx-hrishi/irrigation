<!-- header.html -->

<head>
    <style>
        
        header{
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100px;
            background-color: rgba(1, 1, 250, 0.753);
        }

        #header-heading{
            color: white;
        }

        nav ul li{
            list-style: none;
            display: inline-block;
        }

        nav ul li a{
            text-decoration: none;
            color: white;
            text-transform: capitalize;
            padding: 0 15px;
            font-size: 20px;
            font-weight: bold;
            position: relative;
        }

        nav ul li a::after{
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-bottom: 2px solid indianred;
        }

        nav ul li a::after{
            transform: scale(0,1);
            transition: transform 0.4s ease-in;
        }

    </style>
</head>

<header>
    <h1 id="header-heading">Automatic Farm Irrigation System</h1>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about-us">About Us</a></li>
            <li><a href="/components">Specifications</a></li>
        </ul>
    </nav>
</header>
